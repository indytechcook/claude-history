<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude History</title>
<style>
  :root {
    --bg: #1a1b26; --panel: #1f2130; --panel2: #24263a; --border: #2f3247;
    --fg: #c8d0e0; --dim: #7b83a0; --accent: #7aa2f7; --accent2: #bb9af7;
    --user: #7dcfff; --asst: #9ece6a; --tool: #e0af68; --err: #f7768e;
    --think: #9d7cd8; --event: #565f89;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; background: var(--panel); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 { font-size: 14px; margin: 0; color: var(--accent); font-weight: 600; }
  header .stats { color: var(--dim); font-size: 12px; }
  header .spacer { flex: 1; }
  input, select {
    background: var(--panel2); color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 9px; font: inherit; outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  #q { width: 320px; }
  .main { display: flex; flex: 1; min-height: 0; }
  .sidebar {
    width: 460px; flex-shrink: 0; overflow-y: auto;
    border-right: 1px solid var(--border); background: var(--panel);
  }
  .content { flex: 1; overflow-y: auto; padding: 16px 22px; }
  .row {
    padding: 9px 12px; border-bottom: 1px solid var(--border); cursor: pointer;
  }
  .row:hover { background: var(--panel2); }
  .row.active { background: var(--panel2); border-left: 3px solid var(--accent); }
  .row .title { color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .meta { color: var(--dim); font-size: 11px; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .snippet { color: var(--fg); white-space: pre-wrap; word-break: break-word;
    display: -webkit-box; -webkit-line-clamp: 10; -webkit-box-orient: vertical;
    overflow: hidden; max-height: 15em; }
  .row .badge { color: var(--accent2); }
  .row .subtoggle { color: var(--accent2); font-size: 11px; margin-top: 3px;
    cursor: pointer; user-select: none; display: inline-block; }
  .row .subtoggle:hover { color: var(--accent); }
  .row.subagent { padding-left: 26px; background: rgba(0,0,0,.12);
    border-left: 2px solid var(--accent2); }
  .row.subagent .title { color: var(--dim); }
  .row.subagent .title .bot { color: var(--accent2); margin-right: 4px; }
  .tabs { display: flex; border-bottom: 1px solid var(--border); }
  .tab { padding: 8px 14px; cursor: pointer; color: var(--dim); font-size: 12px; }
  .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
  .snippet mark, .snippet b { color: var(--accent2); background: none; font-weight: 700; }
  .session-head { margin-bottom: 14px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .session-head .h-title { color: var(--accent); font-size: 16px; font-weight: 600; }
  .session-head .h-meta { color: var(--dim); font-size: 12px; margin-top: 4px; }
  .msg { margin: 0 0 14px; border-left: 3px solid var(--border); padding-left: 12px; }
  .msg.user { border-color: var(--user); }
  .msg.assistant { border-color: var(--asst); }
  .msg .who { font-weight: 700; font-size: 12px; }
  .msg.user .who { color: var(--user); }
  .msg.assistant .who { color: var(--asst); }
  .msg .ts { color: var(--dim); font-weight: 400; font-size: 11px; margin-left: 8px; }
  .block { margin-top: 6px; white-space: pre-wrap; word-break: break-word; }
  .block.text { color: var(--fg); }
  .block.thinking { color: var(--think); font-style: italic; opacity: .8; }
  .tool {
    margin-top: 6px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 10px;
  }
  .tool .label { color: var(--tool); font-weight: 700; font-size: 11px; }
  .tool.result .label { color: var(--asst); }
  .tool.result.error .label { color: var(--err); }
  .tool pre { margin: 4px 0 0; white-space: pre-wrap; word-break: break-word; color: var(--dim); max-height: 320px; overflow: auto; }
  .msg.queued { border-color: var(--tool); border-style: dashed; }
  .msg.queued .who { color: var(--tool); }
  .msg.queued .block { color: var(--fg); }
  .event { color: var(--event); font-size: 12px; margin: 5px 0; }
  .event .et { color: var(--accent2); }
  .toggle { color: var(--dim); font-size: 12px; cursor: pointer; user-select: none; }
  .toggle input { vertical-align: middle; }
  .empty { color: var(--dim); padding: 40px; text-align: center; }
  .pill { display:inline-block; padding:1px 6px; border-radius:4px; font-size:10px;
    background: var(--panel2); color: var(--dim); margin-left:6px; }
  details.tool > summary { cursor: pointer; }
  mark { color: var(--accent2); background: none; }
</style>
</head>
<body>
<header>
  <h1>Claude History</h1>
  <input id="q" type="search" placeholder="Search all messages…  (FTS5: term, term*, a AND b)">
  <select id="ftype" title="Block type filter">
    <option value="">any type</option>
    <option value="text">text</option>
    <option value="tool_use">tool_use</option>
    <option value="tool_result">tool_result</option>
    <option value="thinking">thinking</option>
    <option value="queued">queued</option>
  </select>
  <select id="frole" title="Role filter">
    <option value="">any role</option>
    <option value="user">user</option>
    <option value="assistant">assistant</option>
  </select>
  <span class="spacer"></span>
  <span class="stats" id="stats"></span>
</header>

<div class="main">
  <div class="sidebar">
    <div class="tabs">
      <div class="tab active" id="tab-sessions">Sessions</div>
      <div class="tab" id="tab-results">Results</div>
    </div>
    <div id="list"></div>
  </div>
  <div class="content">
    <label class="toggle"><input type="checkbox" id="showEvents"> show events</label>
    <div id="transcript"><div class="empty">Select a session, or search above.</div></div>
  </div>
</div>

<script>
const $ = (s) => document.querySelector(s);
let activeSession = null;
let showEvents = false;
let mode = "sessions";

function esc(s){ return (s==null?"":String(s)); }
function shortId(s){ return (s||"").slice(0,8); }
function shortTime(s){ return (s||"").replace("T"," ").slice(0,16); }

async function getJSON(url){
  const r = await fetch(url);
  return await r.json();
}

async function loadStats(){
  const s = await getJSON("/api/stats");
  $("#stats").textContent =
    `${s.sessions} sessions · ${s.records} records · ${s.blocks} blocks`;
}

async function loadSessions(){
  mode = "sessions";
  setTab("sessions");
  const d = await getJSON("/api/sessions?limit=200");
  const list = $("#list");
  list.innerHTML = "";
  (d.sessions||[]).forEach(s => {
    const row = document.createElement("div");
    row.className = "row" + (s.session_id===activeSession ? " active":"");
    row.dataset.sessionId = s.session_id;
    const title = document.createElement("div");
    title.className = "title";
    title.textContent = s.title;
    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = `${shortTime(s.last)} · ${s.messages} msgs · ${shortId(s.session_id)}`
      + (s.project ? `  ${s.project}` : "");
    row.appendChild(title); row.appendChild(meta);
    row.onclick = () => openSession(s.session_id);

    // Subagents spawned by this session nest underneath, collapsed by default.
    if(s.subagent_count > 0){
      const n = s.subagent_count;
      const tog = document.createElement("div");
      tog.className = "subtoggle";
      tog.dataset.expanded = "0";
      tog.textContent = `▸ ${n} subagent${n>1?"s":""}`;
      tog.onclick = (e) => { e.stopPropagation(); toggleSubagents(tog, row, s.session_id); };
      row.appendChild(tog);
    }
    list.appendChild(row);
  });
}

async function toggleSubagents(tog, parentRow, parentId){
  const open = tog.dataset.expanded === "1";
  if(open){
    // Collapse: remove any child rows we inserted after this parent.
    let el = parentRow.nextElementSibling;
    while(el && el.classList.contains("subagent") && el.dataset.parentId === parentId){
      const next = el.nextElementSibling; el.remove(); el = next;
    }
    tog.dataset.expanded = "0";
    tog.textContent = tog.textContent.replace("▾", "▸");
    return;
  }
  tog.dataset.expanded = "1";
  tog.textContent = tog.textContent.replace("▸", "▾");
  const d = await getJSON("/api/subagents?parent=" + encodeURIComponent(parentId));
  let anchor = parentRow;
  (d.subagents||[]).forEach(c => {
    const row = document.createElement("div");
    row.className = "row subagent" + (c.session_id===activeSession ? " active":"");
    row.dataset.sessionId = c.session_id;
    row.dataset.parentId = parentId;
    const title = document.createElement("div");
    title.className = "title";
    const bot = document.createElement("span");
    bot.className = "bot"; bot.textContent = "🤖";
    title.appendChild(bot);
    title.appendChild(document.createTextNode(c.title));
    title.title = c.title;
    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = `${shortTime(c.last)} · ${c.messages} msgs · ${shortId(c.session_id)}`;
    row.appendChild(title); row.appendChild(meta);
    row.onclick = () => openSession(c.session_id);
    anchor.after(row);
    anchor = row;
  });
}

let searchTimer = null;
function onSearchInput(){
  clearTimeout(searchTimer);
  const q = $("#q").value.trim();
  if(!q){ loadSessions(); return; }
  searchTimer = setTimeout(runSearch, 220);
}

async function runSearch(){
  const q = $("#q").value.trim();
  if(!q){ loadSessions(); return; }
  mode = "results";
  setTab("results");
  const params = new URLSearchParams({ q, limit: "100" });
  const t = $("#ftype").value; if(t) params.set("type", t);
  const r = $("#frole").value; if(r) params.set("role", r);
  const d = await getJSON("/api/search?" + params.toString());
  const list = $("#list");
  list.innerHTML = "";
  if(d.error){
    list.innerHTML = `<div class="empty">${esc(d.error)}</div>`;
    return;
  }
  const res = d.results||[];
  if(!res.length){ list.innerHTML = `<div class="empty">No matches.</div>`; return; }
  res.forEach(m => {
    const row = document.createElement("div");
    row.className = "row" + (m.session_id===activeSession ? " active":"");
    row.dataset.sessionId = m.session_id;
    const title = document.createElement("div");
    title.className = "snippet";
    title.innerHTML = renderSnippet(m.snippet);
    const meta = document.createElement("div");
    meta.className = "meta";
    meta.innerHTML = `<span class="badge">[${esc(m.block_type)}]</span> ${esc(m.role||"")} · `
      + `${shortTime(m.timestamp)} · ${shortId(m.session_id)}`;
    row.appendChild(title); row.appendChild(meta);
    row.onclick = () => openSession(m.session_id);
    list.appendChild(row);
  });
}

function renderSnippet(s){
  // Server marks hits with ‹ › guillemets; turn them into <mark>.
  const safe = document.createElement("div");
  safe.textContent = s||"";
  return safe.innerHTML
    .replaceAll("‹", "<mark>")
    .replaceAll("›", "</mark>");
}

function setTab(which){
  $("#tab-sessions").classList.toggle("active", which==="sessions");
  $("#tab-results").classList.toggle("active", which==="results");
}

async function openSession(id){
  activeSession = id;
  document.querySelectorAll(".sidebar .row").forEach(r =>
    r.classList.toggle("active", r.dataset.sessionId === id));
  const d = await getJSON("/api/session/" + encodeURIComponent(id));
  renderTranscript(d);
}

function renderTranscript(d){
  const t = $("#transcript");
  t.innerHTML = "";
  if(d.error){ t.innerHTML = `<div class="empty">${esc(d.error)}</div>`; return; }
  const s = d.session||{};
  const head = document.createElement("div");
  head.className = "session-head";
  const ht = document.createElement("div"); ht.className="h-title"; ht.textContent = s.title||"(untitled)";
  const hm = document.createElement("div"); hm.className="h-meta";
  hm.textContent = [s.project, s.branch?("@"+s.branch):"", s.version?("v"+s.version):"",
    `${s.messages||0} msgs`, s.session_id].filter(Boolean).join("  ·  ");
  head.appendChild(ht); head.appendChild(hm);
  t.appendChild(head);

  (d.items||[]).forEach(it => {
    if(it.kind === "event"){
      if(!showEvents) return;
      const e = document.createElement("div");
      e.className = "event";
      e.innerHTML = `· <span class="et">${esc(it.event_type)}</span> `
        + `<span class="ts">${shortTime(it.timestamp)}</span> ${esc(it.summary||"")}`;
      t.appendChild(e);
      return;
    }
    if(it.kind === "queued"){
      t.appendChild(renderQueued(it));
      return;
    }
    t.appendChild(renderMessage(it));
  });
  t.parentElement.scrollTop = 0;
}

function renderQueued(it){
  const wrap = document.createElement("div");
  wrap.className = "msg queued";
  const who = document.createElement("div");
  who.className = "who";
  who.innerHTML = `⏳ QUEUED${it.operation?(" ("+esc(it.operation)+")"):""}`
    + `<span class="ts">${shortTime(it.timestamp)}</span>`;
  wrap.appendChild(who);
  const body = document.createElement("div");
  body.className = "block";
  body.textContent = it.text||"";
  wrap.appendChild(body);
  return wrap;
}

function renderMessage(m){
  const wrap = document.createElement("div");
  wrap.className = "msg " + (m.role||"");
  const who = document.createElement("div");
  who.className = "who";
  who.innerHTML = (m.role==="user" ? "▶ USER" : "◆ ASSISTANT")
    + `<span class="ts">${shortTime(m.timestamp)}${m.model?("  "+esc(m.model)):""}</span>`;
  wrap.appendChild(who);

  (m.blocks||[]).forEach(b => {
    if(b.block_type === "text"){
      const d = document.createElement("div");
      d.className = "block text";
      d.textContent = b.text||"";
      wrap.appendChild(d);
    } else if(b.block_type === "thinking"){
      const d = document.createElement("div");
      d.className = "block thinking";
      d.textContent = (b.text && b.text.length) ? b.text : "· thinking (not stored) ·";
      wrap.appendChild(d);
    } else if(b.block_type === "tool_use"){
      const det = document.createElement("details");
      det.className = "tool"; det.open = true;
      const sum = document.createElement("summary");
      sum.className = "label";
      sum.textContent = "⚙ tool_use: " + (b.tool_name||"");
      det.appendChild(sum);
      const pre = document.createElement("pre");
      pre.textContent = prettyJSON(b.tool_input);
      det.appendChild(pre);
      wrap.appendChild(det);
    } else if(b.block_type === "tool_result"){
      const det = document.createElement("details");
      det.className = "tool result" + (b.is_error ? " error":"");
      const sum = document.createElement("summary");
      sum.className = "label";
      sum.textContent = "⮐ tool_result" + (b.is_error ? " (error)" : "");
      det.appendChild(sum);
      const pre = document.createElement("pre");
      pre.textContent = b.tool_result||"";
      det.appendChild(pre);
      wrap.appendChild(det);
    } else {
      const d = document.createElement("div");
      d.className = "block";
      d.innerHTML = `<span class="pill">${esc(b.block_type)}</span>`;
      const pre = document.createElement("div");
      pre.className = "block"; pre.textContent = b.text||"";
      d.appendChild(pre);
      wrap.appendChild(d);
    }
  });
  return wrap;
}

function prettyJSON(s){
  if(s==null) return "";
  try { return JSON.stringify(JSON.parse(s), null, 2); }
  catch(e){ return s; }
}

$("#q").addEventListener("input", onSearchInput);
$("#ftype").addEventListener("change", () => { if($("#q").value.trim()) runSearch(); });
$("#frole").addEventListener("change", () => { if($("#q").value.trim()) runSearch(); });
$("#tab-sessions").onclick = loadSessions;
$("#tab-results").onclick = () => { if($("#q").value.trim()) runSearch(); };
$("#showEvents").addEventListener("change", (e) => {
  showEvents = e.target.checked;
  if(activeSession) openSession(activeSession);
});

loadStats();
loadSessions();
</script>
</body>
</html>
